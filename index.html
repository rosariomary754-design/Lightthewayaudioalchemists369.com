<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lighthouse Beats | Premier Marketplace</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">LIGHT<span>HOUSE</span></div>
            <div class="search-wrapper">
                <i class="fa fa-search"></i>
                <input type="text" placeholder="Search beats, moods, producers...">
            </div>
            <div class="nav-actions">
                <a href="#">Explore</a>
                <button class="btn-gold-outline">Sell Beats</button>
                <div class="user-profile"><i class="fa-regular fa-circle-user"></i></div>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <div class="lighthouse-badge">EST. 2026</div>
            <h1>Your Sound, <span>Illuminated.</span></h1>
            <p>The world's most transparent marketplace for elite music production.</p>
            <div class="hero-cta">
                <button class="btn-gold">Start Browsing</button>
                <button class="btn-glass">Learn Licensing</button>
            </div>
        </div>
    </header>

    <div class="filter-bar">
        <button class="chip active">Trending</button>
        <button class="chip">Hip Hop</button>
        <button class="chip">R&B</button>
        <button class="chip">Pop</button>
        <button class="chip">BPM <i class="fa fa-chevron-down"></i></button>
    </div>

    <main class="grid-container" id="beat-grid">
        </main>

    <footer class="player-bar">
        <div class="player-inner">
            <div class="track-details">
                <img src="https://via.placeholder.com/60" id="player-art" alt="Art">
                <div class="track-text">
                    <h4 id="player-title">Select a Track</h4>
                    <p id="player-producer">Producer Name</p>
                </div>
            </div>
            
            <div class="player-controls">
                <div class="transport">
                    <i class="fa fa-random"></i>
                    <i class="fa fa-step-backward"></i>
                    <i class="fa fa-play-circle" id="master-play"></i>
                    <i class="fa fa-step-forward"></i>
                    <i class="fa fa-redo"></i>
                </div>
                <div id="waveform-container">
                    <div class="wave-mock"></div> </div>
            </div>

            <div class="player-buy">
                <span class="price" id="player-price">$29.99</span>
                <button class="btn-gold-sm">Add to Cart</button>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
