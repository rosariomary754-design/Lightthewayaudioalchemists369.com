<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lighthouse Beats | Producer Marketplace</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <span class="icon">🚨</span> Lighthouse <strong>Beats</strong>
        </div>
        <div class="nav-links">
            <a href="#">Marketplace</a>
            <a href="#">Producers</a>
            <a href="#">Licenses</a>
        </div>
        <div class="auth-buttons">
            <button class="btn-text">Log In</button>
            <button class="btn-primary">Get Started</button>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>Guiding Your Sound to the <strong>Main Stage</strong></h1>
            <p>The premium marketplace for exclusive beats, publishing rights, and producer services.</p>
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Search by genre, mood, or BPM...">
                <button id="search-btn">Search</button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="filters">
            <button class="filter-chip active">All</button>
            <button class="filter-chip">Trap</button>
            <button class="filter-chip">Lo-Fi</button>
            <button class="filter-chip">Boom Bap</button>
            <button class="filter-chip">BPM (140+)</button>
        </section>

        <div class="beat-grid" id="beat-grid">
            </div>
    </main>

    <footer class="audio-player">
        <div class="player-info">
            <img src="https://via.placeholder.com/50" alt="Artwork" id="now-playing-img">
            <div>
                <h4 id="now-playing-title">Select a track</h4>
                <p id="now-playing-producer">Producer Name</p>
            </div>
        </div>
        
        <div class="player-controls">
            <div class="playback-btns">
                <i data-lucide="skip-back"></i>
                <i data-lucide="play-circle" class="play-btn" id="master-play"></i>
                <i data-lucide="skip-forward"></i>
            </div>
            <div class="waveform-container">
                <div class="waveform-bg"></div>
                <div class="waveform-progress" id="wave-progress"></div>
            </div>
        </div>

        <div class="player-actions">
            <span class="price-tag">$29.99</span>
            <button class="btn-buy">Add to Cart</button>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
